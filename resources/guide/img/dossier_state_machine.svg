  </defs>
  <!-- Row 1 -->
  <rect x="5" y="20" width="65" height="30" rx="4" fill="#107C10"/>
  <text x="37" y="39" text-anchor="middle" fill="white" font-weight="bold" font-size="10">CRÉÉ</text>
  <line x1="70" y1="35" x2="88" y2="35" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="88" y="20" width="100" height="30" rx="4" fill="#0d6efd"/>
  <text x="138" y="39" text-anchor="middle" fill="white" font-weight="bold" font-size="10">DIAGNOSTIC</text>
  <line x1="188" y1="35" x2="206" y2="35" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="206" y="12" width="108" height="46" rx="4" fill="#D83B01"/>
  <text x="260" y="31" text-anchor="middle" fill="white" font-weight="bold" font-size="9.5">ATTENTE</text>
  <text x="260" y="47" text-anchor="middle" fill="white" font-weight="bold" font-size="9.5">DEVIS</text>
  <line x1="314" y1="35" x2="332" y2="35" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="332" y="20" width="90" height="30" rx="4" fill="#fd7e14"/>
  <text x="377" y="39" text-anchor="middle" fill="white" font-weight="bold" font-size="10">EN COURS</text>
  <!-- Down connector -->
  <path d="M422,50 L422,115" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- Row 2 (right→left) -->
  <rect x="332" y="115" width="90" height="30" rx="4" fill="#0dcaf0"/>
  <text x="377" y="134" text-anchor="middle" fill="#0a2a30" font-weight="bold" font-size="10">QUALITÉ</text>
  <line x1="332" y1="130" x2="308" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arrl)"/>
  <rect x="208" y="115" width="96" height="30" rx="4" fill="#198754"/>
  <text x="256" y="134" text-anchor="middle" fill="white" font-weight="bold" font-size="10">PRÊT</text>
  <line x1="208" y1="130" x2="185" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arrl)"/>
  <rect x="82" y="115" width="100" height="30" rx="4" fill="#343a40"/>
  <text x="132" y="134" text-anchor="middle" fill="white" font-weight="bold" font-size="10">CLÔTURÉ</text>
  <!-- Labels -->
  <text x="240" y="165" text-anchor="middle" fill="#888" font-size="8.5" font-style="italic">Cycle de vie d'un Dossier de Réparation — Alfa Computers Apps</text>
