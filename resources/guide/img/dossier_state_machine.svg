<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 170" style="font-family:'Segoe UI',Arial,sans-serif;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
